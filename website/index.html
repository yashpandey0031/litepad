<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LitePad - Fast, Bloat-Free, Zero-Telemetry Notepad for Windows</title>
    <meta
      name="description"
      content="LitePad is a lightning-fast, bloat-free, zero-telemetry notepad for Windows. Native Rust — no Electron, no web view — a single 4 MB .exe with autosave, a notes sidebar, and dark mode."
    />
    <meta
      name="keywords"
      content="LitePad, notepad, Windows notepad, lightweight notepad, fast notepad, Rust notepad, zero telemetry, bloat-free, open source notepad, notepad alternative, autosave notes, minimal text editor"
    />
    <meta name="author" content="Yash Pandey" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Canonical + social preview. If you deploy somewhere other than GitHub
         Pages, update this domain (and the og:/twitter:/JSON-LD URLs below). -->
    <link rel="canonical" href="https://yashpandey0031.github.io/litepad/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LitePad" />
    <meta
      property="og:title"
      content="LitePad — Fast, Bloat-Free Notepad for Windows"
    />
    <meta
      property="og:description"
      content="A lightning-fast, zero-telemetry notepad for Windows. Native Rust, a single 4 MB .exe with autosave, a notes sidebar, and dark mode."
    />
    <meta property="og:url" content="https://yashpandey0031.github.io/litepad/" />
    <meta
      property="og:image"
      content="https://yashpandey0031.github.io/litepad/icon.png"
    />
    <meta property="og:image:alt" content="LitePad app icon" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="LitePad — Fast, Bloat-Free Notepad for Windows"
    />
    <meta
      name="twitter:description"
      content="A lightning-fast, zero-telemetry notepad for Windows. Native Rust, a single 4 MB .exe."
    />
    <meta
      name="twitter:image"
      content="https://yashpandey0031.github.io/litepad/icon.png"
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />

    <!-- Structured data: helps search engines show a rich result -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "LitePad",
        "operatingSystem": "Windows",
        "applicationCategory": "UtilitiesApplication",
        "description": "A bloat-free, lightning-fast, zero-telemetry notepad for Windows. Native Rust, a single 4 MB .exe with autosave, a notes sidebar, and dark mode.",
        "url": "https://yashpandey0031.github.io/litepad/",
        "image": "https://yashpandey0031.github.io/litepad/icon.png",
        "downloadUrl": "https://github.com/yashpandey0031/litepad/releases/latest/download/LitePad-Setup.exe",
        "softwareVersion": "0.1.0",
        "fileSize": "4MB",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": {
          "@type": "Person",
          "name": "Yash Pandey",
          "url": "https://github.com/yashpandey0031"
        }
      }
    </script>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #111111;
        --muted: #6b6b6b;
        --card: #ffffff;
        --border: #e6e6e6;
        --btn-bg: #111111;
        --btn-fg: #ffffff;
        --btn2-bg: #ffffff;
        --btn2-fg: #111111;
        --chip: #f4f4f4;
        --radius: 18px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d0d0d;
          --fg: #f2f2f2;
          --muted: #9a9a9a;
          --card: #151515;
          --border: #262626;
          --btn-bg: #f2f2f2;
          --btn-fg: #0d0d0d;
          --btn2-bg: #151515;
          --btn2-fg: #f2f2f2;
          --chip: #1c1c1c;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      /* Hero fills the first screen; the preview scrolls in just below. */
      main {
        width: 100%;
        max-width: 560px;
        min-height: calc(100vh - 48px);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }

      /* ---- Logo ---- */
      .logo {
        width: 108px;
        height: 108px;
        display: block;
        filter: drop-shadow(0 12px 26px rgba(0, 0, 0, 0.28));
      }

      h1 {
        font-size: clamp(2.4rem, 7vw, 3.4rem);
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      h1 .dot {
        color: var(--muted);
      }

      .tagline {
        font-size: clamp(1rem, 2.6vw, 1.18rem);
        color: var(--muted);
        line-height: 1.55;
        max-width: 440px;
      }

      /* ---- Feature chips ---- */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }
      .chip {
        background: var(--chip);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 13px;
        font-size: 0.82rem;
        font-weight: 500;
      }

      /* ---- Buttons ---- */
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 2px;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        border-radius: 14px;
        padding: 14px 22px;
        font-size: 1rem;
        font-weight: 600;
        border: 1px solid transparent;
        transition:
          transform 0.08s ease,
          opacity 0.15s ease;
      }
      a.btn:active {
        transform: translateY(1px) scale(0.99);
      }
      a.btn svg {
        flex: 0 0 auto;
      }

      .btn-primary {
        background: var(--btn-bg);
        color: var(--btn-fg);
      }
      .btn-primary:hover {
        opacity: 0.88;
      }

      .btn-secondary {
        background: var(--btn2-bg);
        color: var(--btn2-fg);
        border-color: var(--border);
      }
      .btn-secondary:hover {
        border-color: var(--muted);
      }

      .stars {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding-left: 11px;
        margin-left: 3px;
        border-left: 1px solid var(--border);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .stars svg {
        width: 15px;
        height: 15px;
      }

      /* ---- Preview ---- */
      .preview {
        width: 100%;
        max-width: 1040px;
        text-align: center;
        padding: 8px 0 32px;
      }
      .preview-label {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .shots {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
      }
      .shot {
        flex: 1 1 280px;
        max-width: 320px;
        margin: 0;
      }
      .shot img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
        transition:
          transform 0.28s cubic-bezier(0.2, 0.7, 0.2, 1),
          box-shadow 0.28s ease;
      }
      .shot:hover img {
        transform: translateY(-8px) scale(1.035);
        box-shadow: 0 22px 46px rgba(0, 0, 0, 0.34);
      }
      .shot figcaption {
        margin-top: 11px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
      }

      footer {
        text-align: center;
        font-size: 0.78rem;
        color: var(--muted);
        padding: 6px 0 28px;
      }

      @media (max-height: 560px) {
        .logo {
          width: 76px;
          height: 76px;
        }
        main {
          gap: 14px;
        }
        .chips {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <!-- App icon -->
      <img class="logo" src="icon.png" alt="LitePad icon" width="108" height="108" />

      <h1>LitePad<span class="dot">.</span></h1>

      <p class="tagline">
        A bloat-free, lightning-fast, zero-telemetry notepad for Windows. Native
        Rust no Ele-ctron, no web view,
        one&nbsp;4&nbsp;MB&nbsp;<code>.exe</code>.
      </p>

      <div class="chips">
        <span class="chip">Autosave</span>
        <span class="chip">Zero Telemetry</span>
        <span class="chip">Black / White</span>
        <span class="chip">Snappy</span>
      </div>

      <div class="actions">
        <!-- Download (Windows) -->
        <a
          class="btn btn-primary"
          href="https://github.com/yashpandey0031/litepad/releases/latest/download/LitePad-Setup.exe"
          rel="noopener"
          download
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 48 48"
            fill="currentColor"
            aria-hidden="true"
          >
            <path d="M0 6.9 21.6 3.9 21.6 22.8 0 22.8Z" />
            <path d="M24.2 3.5 48 0.2 48 22.8 24.2 22.8Z" />
            <path d="M0 25.2 21.6 25.2 21.6 44.1 0 41.1Z" />
            <path d="M24.2 25.2 48 25.2 48 47.8 24.2 44.5Z" />
          </svg>
          Download for Windows
        </a>

        <!-- GitHub + live star count -->
        <a
          class="btn btn-secondary"
          href="https://github.com/yashpandey0031/litepad"
          rel="noopener"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.575.106.785-.25.785-.556 0-.274-.01-1-.015-1.965-3.196.695-3.87-1.54-3.87-1.54-.523-1.33-1.277-1.684-1.277-1.684-1.044-.714.08-.7.08-.7 1.154.082 1.762 1.185 1.762 1.185 1.026 1.758 2.692 1.25 3.348.955.104-.743.402-1.25.73-1.538-2.552-.29-5.236-1.276-5.236-5.68 0-1.255.448-2.28 1.183-3.084-.119-.29-.513-1.46.112-3.045 0 0 .965-.31 3.163 1.178a10.98 10.98 0 0 1 5.76 0c2.196-1.488 3.16-1.178 3.16-1.178.627 1.585.233 2.755.114 3.045.737.804 1.182 1.829 1.182 3.084 0 4.415-2.688 5.386-5.248 5.671.413.355.78 1.056.78 2.13 0 1.538-.014 2.778-.014 3.156 0 .309.207.668.79.555A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"
            />
          </svg>
          GitHub
          <span class="stars" title="GitHub stars">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M12 2.3l2.9 5.9 6.5.95-4.7 4.58 1.11 6.47L12 17.2l-5.81 3.05 1.11-6.47L2.6 9.15l6.5-.95z"
              />
            </svg>
            <span id="star-count">—</span>
          </span>
        </a>
      </div>
    </main>

    <!-- Preview screenshots (one per theme) with a lift-on-hover animation -->
    <section class="preview" aria-label="Preview">
      <p class="preview-label">Preview</p>
      <div class="shots">
        <figure class="shot">
          <img
            src="preview-light.png"
            alt="LitePad running in the Light theme"
            loading="lazy"
          />
          <figcaption>Light</figcaption>
        </figure>
        <figure class="shot">
          <img
            src="preview-dark.png"
            alt="LitePad running in the Dark theme"
            loading="lazy"
          />
          <figcaption>Dark</figcaption>
        </figure>
        <figure class="shot">
          <img
            src="preview-brown.png"
            alt="LitePad running in the Brown theme"
            loading="lazy"
          />
          <figcaption>Brown</figcaption>
        </figure>
      </div>
    </section>

    <footer>Made with Rust 🦀</footer>

    <script>
      // Live star count from the GitHub API (fails silently if offline / rate-limited).
      fetch("https://api.github.com/repos/yashpandey0031/litepad")
        .then(function (r) {
          return r.ok ? r.json() : null;
        })
        .then(function (d) {
          if (d && typeof d.stargazers_count === "number") {
            document.getElementById("star-count").textContent =
              d.stargazers_count.toLocaleString();
          } else {
            document.getElementById("star-count").textContent = "0";
          }
        })
        .catch(function () {
          document.getElementById("star-count").textContent = "0";
        });
    </script>
  </body>
</html>
